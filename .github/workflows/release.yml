name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  # ── Cria a release no GitHub (sem assets) ───────────────────────────────────
  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    steps:
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "Writtt ${{ github.ref_name }}"
          body: |
            ## Writtt ${{ github.ref_name }}

            ### Download

            | Plataforma | Arquivo | Tipo |
            |------------|---------|------|
            | 🪟 **Windows** | `writtt-windows-amd64-installer.exe` | Instalador NSIS (recomendado) |
            | 🪟 **Windows** | `writtt-windows-amd64.exe` | Executável portátil |
            | 🍎 **macOS** | `writtt-macos-universal.dmg` | Imagem de disco (recomendado) |
            | 🍎 **macOS** | `writtt-macos-universal.zip` | App compactado |
            | 🐧 **Linux** | `writtt-linux-amd64.tar.gz` | Binário compactado |

            ### Notas
            **Windows:** Instalador autoassinado — se o SmartScreen aparecer, clique em _More info → Run anyway_.

            **macOS:** App não notarizado — primeira execução: _System Settings → Privacy & Security → Open Anyway_.

            **Linux:** Extraia e execute. Pode ser necessário `chmod +x writtt`.

            Veja o [README](https://github.com/${{ github.repository }}) para instruções completas.
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}

  # ── Build Windows ────────────────────────────────────────────────────────────
  build-windows:
    name: Build Windows
    needs: create-release
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install NSIS
        shell: pwsh
        run: |
          choco install nsis --yes --no-progress
          $nsisDir = @(
            'C:\Program Files (x86)\NSIS',
            'C:\Program Files\NSIS'
          ) | Where-Object { Test-Path "$_\makensis.exe" } | Select-Object -First 1
          if (-not $nsisDir) {
            $nsisDir = Split-Path (
              [System.Environment]::GetEnvironmentVariable('Path','Machine').Split(';') |
              Where-Object { Test-Path "$_\makensis.exe" } |
              Select-Object -First 1
            )
          }
          if (-not $nsisDir) {
            Write-Error "makensis.exe nao encontrado. Verifique a instalacao do NSIS."
            exit 1
          }
          Write-Host "NSIS dir: $nsisDir"
          "$nsisDir" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          Write-Host "makensis adicionado ao GITHUB_PATH"

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: Patch wails.json productVersion
        shell: pwsh
        run: |
          $ver = '${{ github.ref_name }}' -replace '^v',''
          $json = Get-Content wails.json -Raw | ConvertFrom-Json
          $json.info.productVersion = $ver
          $json | ConvertTo-Json -Depth 10 | Set-Content wails.json
          Write-Host "productVersion set to $ver"

      - name: Build Windows (com instalador NSIS)
        shell: pwsh
        run: |
          Write-Host "makensis path: $(Get-Command makensis | Select-Object -ExpandProperty Source)"
          wails build --nsis --platform windows/amd64 `
            -ldflags "-X main.CurrentVersion=${{ github.ref_name }}"
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Preparar assets Windows
        shell: pwsh
        run: |
          Write-Host '=== build/ (recursivo) ==='
          Get-ChildItem build -Recurse -ErrorAction SilentlyContinue | Select-Object FullName, Length | Format-Table

          Copy-Item build\bin\writtt.exe writtt-windows-amd64.exe -ErrorAction Stop
          Write-Host "Portatil copiado OK: $(Get-Item writtt-windows-amd64.exe | Select-Object -ExpandProperty Length) bytes"

          $installer = Get-ChildItem build -Recurse -ErrorAction SilentlyContinue |
            Where-Object {
              $_.Extension -eq '.exe' -and
              $_.Name -imatch 'writtt' -and
              $_.Name -imatch 'installer' -and
              $_.Name -inotmatch 'webview|edge|microsoft'
            } |
            Sort-Object LastWriteTime -Descending |
            Select-Object -First 1

          if ($installer) {
            Copy-Item $installer.FullName writtt-windows-amd64-installer.exe -ErrorAction Stop
            Write-Host "Instalador copiado de: $($installer.FullName)"
          } else {
            Write-Warning "Instalador NSIS nao encontrado - apenas o exe portatil sera enviado"
            Get-ChildItem build -Recurse -Filter '*.exe' -ErrorAction SilentlyContinue |
              Select-Object FullName, Length | Format-Table
          }

      - name: Upload Windows assets
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $files = @('writtt-windows-amd64.exe')
          if (Test-Path 'writtt-windows-amd64-installer.exe') {
            $files += 'writtt-windows-amd64-installer.exe'
            Write-Host "Enviando portatil + instalador"
          } else {
            Write-Host "Enviando apenas portatil (instalador nao encontrado)"
          }
          foreach ($f in $files) {
            gh release upload '${{ github.ref_name }}' $f --clobber
          }

  # ── Build macOS ──────────────────────────────────────────────────────────────
  build-macos:
    name: Build macOS
    needs: create-release
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: Patch wails.json productVersion
        env:
          TAG: ${{ github.ref_name }}
        run: |
          VER="${TAG#v}"
          python3 -c "
          import json, sys
          with open('wails.json', 'r') as f:
              d = json.load(f)
          d['info']['productVersion'] = sys.argv[1]
          with open('wails.json', 'w') as f:
              json.dump(d, f, indent=2)
          " "$VER"
          echo "productVersion set to $VER"

      - name: Build macOS universal
        run: |
          wails build --platform darwin/universal \
            -ldflags "-X main.CurrentVersion=${{ github.ref_name }}"

      - name: Criar DMG
        run: |
          brew install create-dmg
          create-dmg \
            --volname "Writtt" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 100 \
            --icon "writtt.app" 175 190 \
            --hide-extension "writtt.app" \
            --app-drop-link 425 190 \
            "writtt-macos-universal.dmg" \
            "build/bin/"

      - name: Criar ZIP do .app
        run: |
          cd build/bin
          zip -r ../../writtt-macos-universal.zip writtt.app

      - name: Upload macOS assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: |
            writtt-macos-universal.dmg
            writtt-macos-universal.zip

  # ── Build Linux ──────────────────────────────────────────────────────────────
  build-linux:
    name: Build Linux
    needs: create-release
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar dependencias de sistema (Wails v2 / GTK)
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.0-dev \
            build-essential \
            pkg-config

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: Patch wails.json productVersion
        env:
          TAG: ${{ github.ref_name }}
        run: |
          VER="${TAG#v}"
          python3 -c "
          import json, sys
          with open('wails.json', 'r') as f:
              d = json.load(f)
          d['info']['productVersion'] = sys.argv[1]
          with open('wails.json', 'w') as f:
              json.dump(d, f, indent=2)
          " "$VER"
          echo "productVersion set to $VER"

      - name: Build Linux
        run: |
          wails build --platform linux/amd64 \
            -ldflags "-X main.CurrentVersion=${{ github.ref_name }}"

      - name: Criar tar.gz
        run: |
          cd build/bin
          tar -czf ../../writtt-linux-amd64.tar.gz writtt

      - name: Upload Linux assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: |
            writtt-linux-amd64.tar.gz
